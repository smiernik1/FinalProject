<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1> Meal Planner</h1>
    <p class="subtitle">Wpisz liczbę dni i wygeneruj plan posiłków.</p>

    <section class="card">
        <h2> Generowanie meal planu </h2>
        <form id="meal-plan-form">
            <div class = "days-row">
                <label for="daysCount"><strong>Liczba dni:</strong></label>
                <input type="number" id="daysCount" min="1" max="5">
                <label for="mealsPerDay"><strong>Dzienna liczba posiłków:</strong></label>
                <input type="number" id="mealsPerDay" min="1" max="8">
            </div>

            <div class="dish-types-row">
                <p><strong>Typy posiłków:</strong></p>
                <label><input type="checkbox" name="dishType" value="breakfast"> Śniadanie</label>
                <label><input type="checkbox" name="dishType" value="appetizer"> Przystawka</label>
                <label><input type="checkbox" name="dishType" value="soup"> Zupa</label>
                <label><input type="checkbox" name="dishType" value="main course"> Danie główne</label>
                <label><input type="checkbox" name="dishType" value="dessert"> Deser</label>
                <label><input type="checkbox" name="dishType" value="salad"> Sałatka</label>
                <label><input type="checkbox" name="dishType" value="snack"> Przekąska</label>
                <label><input type="checkbox" name="dishType" value="beverage"> Napój</label>
            </div>

            <div class="diet-row">
                <p><strong>Dieta:</strong></p>
                <label><input type="radio" name="diet" value="" checked> Brak</label>
                <label><input type="radio" name="diet" value="vegetarian"> Wegetariańska</label>
                <label><input type="radio" name="diet" value="vegan"> Wegańska</label>
                <label><input type="radio" name="diet" value="gluten-free"> Bezglutenowa</label>
                <label><input type="radio" name="diet" value="dairy-free"> Bez nabiału</label>
            </div>

            <p><strong>Dzienna liczba kalorii </strong>(opcjonalnie)<strong>:</strong></p>

            <div class = "calories-row">
                <label for="minCalories">Min:</label>
                <input type="number" name="minCalories" id="minCalories" min="0">
                <label for="maxCalories">Max:</label>
                <input type="number" name="maxCalories" id="maxCalories" min="10">
            </div>

            <button type="submit">Generuj meal plan</button>
        </form>
        <p id="message"></p>
    </section>

    <section class="card">
        <h2>Istniejące meal plany</h2>

        <button id="load-meal-plans-button" type="button">
            Pokaż zapisane meal plany
        </button>

        <div id="meal-plans-list"></div>
    </section>

    <section class="card hidden" id="meal-plan-section">
        <div class="section-header">
            <h2> Wygenerowany meal plan </h2>
            <button id="shopping-list-button" type="button">Lista zakupów</button>
        </div>
        <div id="meal-plan-info"></div>
<!--        <div id="calorie-warning"></div>-->
        <div id="recipes-list"></div>
    </section>

    <section class="card hidden" id="recipe-details-section">
        <h2>Szczegóły przepisu</h2>
        <div id="recipe-details"></div>
    </section>

    <section class="card hidden" id="shopping-list-section">
        <div class="section-header">
            <h2>Lista zakupów</h2>
            <div class="recipe-header">
                <button id="edit-shopping-list-button" type="button">Edytuj</button>
                <button id="download-shopping-list-button" type="button">Pobierz</button>
            </div>
        </div>
        <div id="shopping-list"></div>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
