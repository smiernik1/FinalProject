<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edycja listy zakupów</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Edycja listy zakupów</h1>
  <p class="subtitle">Możesz edytować, usuwać i dodawać elementy listy.</p>

  <section class="card">
    <div id="shopping-list-meta"></div>
    <p id="shopping-list-message"></p>

    <div id="shopping-list-items-container"></div>

    <div class="recipe-actions" style="margin-top: 16px;">
      <button type="button" id="add-item-button">Dodaj element</button>
      <button type="button" id="save-button">Zapisz</button>
      <button type="button" id="saveAndExitButton">Zapisz i wyjdź</button>
      <button type="button" id="cancel-button">Wyjdź bez zapisywania</button>
    </div>
  </section>
</div>

<script src="shopping-list.js"></script>
</body>
</html>
